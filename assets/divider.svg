<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 20" width="100%" height="20">
  <style>
    .line {
      stroke: #00f0ff;
      stroke-width: 1;
      stroke-opacity: 0.2;
    }
    .glow {
      filter: drop-shadow(0px 0px 3px rgba(0, 240, 255, 0.7));
    }
    .accent {
      fill: #00f0ff;
    }
    .accent-purple {
      fill: #7a1fa2;
    }
  </style>
  <line x1="0" y1="10" x2="800" y2="10" class="line"/>
  <line x1="250" y1="10" x2="550" y2="10" stroke="#00f0ff" stroke-width="1.5" class="glow"/>
  
  <rect x="393" y="7" width="14" height="6" class="accent glow" transform="rotate(45 400 10)"/>
  <circle cx="360" cy="10" r="3" class="accent-purple"/>
  <circle cx="440" cy="10" r="3" class="accent-purple"/>
  <line x1="330" y1="6" x2="330" y2="14" stroke="#00f0ff" stroke-width="1.5"/>
  <line x1="470" y1="6" x2="470" y2="14" stroke="#00f0ff" stroke-width="1.5"/>
</svg>
