<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="240">
  <defs>
    <!-- Standard SVG Glow Filter -->
    <filter id="cyan-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="0.8" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .grid {
      fill: none;
      stroke: rgba(0, 240, 255, 0.05);
      stroke-width: 1;
    }
    .hud-line {
      fill: none;
      stroke: #00f0ff;
      stroke-width: 1.5;
    }
    .text-title {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-weight: 700;
      fill: #00f0ff;
      font-size: 20px;
      letter-spacing: 2px;
    }
    .text-subtitle {
      font-family: 'Outfit', 'Inter', sans-serif;
      fill: #c5c6c7;
      font-size: 13px;
    }
    .text-mono {
      font-family: 'Fira Code', 'Courier New', monospace;
      fill: #00ff66;
      font-size: 11px;
    }
    .bg-main {
      fill: #020308;
    }
    .bg-card {
      fill: #080c24;
      stroke: rgba(0, 240, 255, 0.15);
      stroke-width: 1;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="240" rx="6" class="bg-main"/>
  
  <!-- Cyber Grid -->
  <path d="M 0 40 L 800 40 M 0 80 L 800 80 M 0 120 L 800 120 M 0 160 L 800 160 M 0 200 L 800 200 M 40 0 L 40 240 M 80 0 L 80 240 M 120 0 L 120 240 M 160 0 L 160 240 M 200 0 L 200 240 M 240 0 L 240 240 M 280 0 L 280 240 M 320 0 L 320 240 M 360 0 L 360 240 M 400 0 L 400 240 M 440 0 L 440 240 M 480 0 L 480 240 M 520 0 L 520 240 M 560 0 L 560 240 M 600 0 L 600 240 M 640 0 L 640 240 M 680 0 L 680 240 M 720 0 L 720 240 M 760 0 L 760 240" class="grid"/>

  <!-- Left HUD Accent Box -->
  <rect x="25" y="25" width="750" height="190" rx="4" fill="none" stroke="rgba(0, 240, 255, 0.12)" stroke-width="1"/>
  
  <!-- Outer glowing bracket accents -->
  <!-- Top-Left -->
  <path d="M 20 50 L 20 20 L 50 20" class="hud-line" filter="url(#cyan-glow)"/>
  <!-- Top-Right -->
  <path d="M 780 50 L 780 20 L 750 20" class="hud-line" filter="url(#cyan-glow)"/>
  <!-- Bottom-Left -->
  <path d="M 20 190 L 20 220 L 50 220" class="hud-line" filter="url(#cyan-glow)"/>
  <!-- Bottom-Right -->
  <path d="M 780 190 L 780 220 L 750 220" class="hud-line" filter="url(#cyan-glow)"/>

  <!-- Inner HUD Grid Card -->
  <rect x="40" y="40" width="460" height="160" rx="3" class="bg-card"/>
  <rect x="520" y="40" width="240" height="160" rx="3" class="bg-card"/>

  <!-- Title inside Main Card -->
  <text x="60" y="75" class="text-title" filter="url(#cyan-glow)">CYBERMYSTIC // PORTAL</text>
  <text x="60" y="98" class="text-subtitle">Security Operations & Threat Defense Terminal</text>

  <!-- Left Stats Block -->
  <!-- Label/Val 1 -->
  <text x="60" y="135" font-family="'Fira Code', monospace" font-size="11" fill="#7a1fa2" font-weight="bold">> OPERATOR:</text>
  <text x="160" y="135" font-family="'Fira Code', monospace" font-size="11" fill="#00f0ff">Jude Paulraj</text>

  <!-- Label/Val 2 -->
  <text x="60" y="155" font-family="'Fira Code', monospace" font-size="11" fill="#7a1fa2" font-weight="bold">> SPECIALTY:</text>
  <text x="160" y="155" font-family="'Fira Code', monospace" font-size="11" fill="#c5c6c7">Threat Detection & VAPT</text>

  <!-- Label/Val 3 -->
  <text x="60" y="175" font-family="'Fira Code', monospace" font-size="11" fill="#7a1fa2" font-weight="bold">> STATUS:</text>
  <text x="160" y="175" font-family="'Fira Code', monospace" font-size="11" fill="#00ff66">Active SecOps & SIEM Audits</text>

  <!-- Right Dashboard Widget -->
  <text x="540" y="70" font-family="'Fira Code', monospace" font-size="12" fill="#00f0ff" font-weight="bold">HUD TELEMETRY</text>
  <line x1="540" y1="80" x2="740" y2="80" stroke="rgba(0, 240, 255, 0.2)" stroke-width="1"/>
  
  <!-- Status entries -->
  <circle cx="548" cy="102" r="4" fill="#00ff66" filter="url(#cyan-glow)"/>
  <text x="562" y="106" class="text-mono">FIREWALL: SECURED</text>

  <circle cx="548" cy="127" r="4" fill="#00f0ff"/>
  <text x="562" y="131" font-family="'Fira Code', monospace" fill="#00f0ff" font-size="11">MONITOR: ACTIVE</text>

  <circle cx="548" cy="152" r="4" fill="#00ff66"/>
  <text x="562" y="156" class="text-mono">RISK RATING: LOW</text>

  <circle cx="548" cy="177" r="4" fill="#7a1fa2"/>
  <text x="562" y="181" font-family="'Fira Code', monospace" fill="#7a1fa2" font-size="11">SOC_SIEM: DISPATCHED</text>
</svg>
